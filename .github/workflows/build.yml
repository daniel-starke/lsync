name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build Application
      run: |
        mkdir -p bin
        make
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lsync
        path: bin/lsync
